server {
    listen 80 ; 
    server_name ca.macrz.com; 
    http2 on; 
    access_log /www/sites/ca.macrz.com/log/access.log main; 
    error_log /www/sites/ca.macrz.com/log/error.log; 
    client_max_body_size 10m; 
    client_body_timeout 1h; 
    send_timeout 1h; 
    keepalive_timeout 1h; 
    location ^~ /.well-known/acme-challenge {
        allow all; 
        root /usr/share/nginx/html; 
    }
    location ~ ^/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ {
        access_by_lua_block {
            return
        }
        log_by_lua_block {
            return
        }
        grpc_pass grpc://ty.macrz.com:10500; 
        grpc_connect_timeout 2s; 
        grpc_read_timeout 1h; 
        grpc_send_timeout 1h; 
        grpc_socket_keepalive on; 
        grpc_next_upstream error timeout invalid_header http_502 http_503 http_504; 
        grpc_next_upstream_tries 5; 
        grpc_next_upstream_timeout 20s; 
        grpc_set_header Host ty.macrz.com:10500; 
        grpc_set_header TE trailers; 
        grpc_set_header X-Real-IP $remote_addr; 
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
        grpc_set_header X-Forwarded-Proto $scheme; 
        grpc_set_header X-Forwarded-Port $server_port; 
        grpc_set_header X-Forwarded-Host $host; 
    }
    location / {
        return 301 https://$host$request_uri; 
    }
    include /www/sites/ca.macrz.com/proxy/*.conf; 
}
server {
    listen 443 ssl ; 
    server_name ca.macrz.com; 
    http2 on; 
    client_max_body_size 10m; 
    client_body_timeout 1h; 
    send_timeout 1h; 
    keepalive_timeout 1h; 
    index index.php index.html index.htm default.php default.htm default.html; 
    root /www/sites/ca.macrz.com/index; 
    access_log /www/sites/ca.macrz.com/log/access.log main; 
    error_log /www/sites/ca.macrz.com/log/error.log; 
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404; 
    }
    location ^~ /.well-known/acme-challenge {
        allow all; 
        root /usr/share/nginx/html; 
    }
    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403; 
    }
    ssl_certificate /www/sites/ca.macrz.com/ssl/fullchain.pem; 
    ssl_certificate_key /www/sites/ca.macrz.com/ssl/privkey.pem; 
    ssl_protocols TLSv1.3 TLSv1.2; 
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256:!aNULL:!eNULL:!EXPORT:!DSS:!DES:!RC4:!3DES:!MD5:!PSK:!KRB5:!SRP:!CAMELLIA:!SEED; 
    ssl_prefer_server_ciphers off; 
    ssl_session_cache shared:SSL:10m; 
    ssl_session_timeout 10m; 
    error_page 497 https://$host$request_uri; 
    proxy_set_header X-Forwarded-Proto https; 
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; 
    # 如需启用真正的双向 HTTPS（mTLS），取消注释并提供客户端 CA。
    # ssl_client_certificate /www/sites/ca.macrz.com/ssl/client_ca.pem;
    # ssl_verify_client on;
    # ssl_verify_depth 2;
    include /www/sites/ca.macrz.com/proxy/*.conf; 
}
location / {
    # 本项目在默认部署下以单端口 gRPC 方式运行：宿主机 10500 -> 容器 8000。
    # docker-compose.yml 中默认 HTTP_ENABLED=false，且当 PORT == GRPC_PORT 时 src/main.py 会关闭 HTTP。
    # 因此这里应使用 grpc_pass，而不是 proxy_pass。
    grpc_pass grpc://127.0.0.1:10500;

    grpc_connect_timeout 5s;
    grpc_read_timeout 10m;
    grpc_send_timeout 10m;
    grpc_socket_keepalive on;

    grpc_next_upstream error timeout invalid_header http_502 http_503 http_504;
    grpc_next_upstream_tries 2;

    grpc_set_header Host $host;
    grpc_set_header TE trailers;
    grpc_set_header X-Real-IP $remote_addr;
    grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    grpc_set_header X-Forwarded-Proto $scheme;
    grpc_set_header X-Forwarded-Port $server_port;
    grpc_set_header X-Forwarded-Host $host;

    # 如果后端 10500 本身也开启了 TLS（即项目设置了 TLS_CERTFILE/TLS_KEYFILE），改成下面这一组：
    # grpc_pass grpcs://127.0.0.1:10500;
    # grpc_ssl_server_name on;
    # grpc_ssl_name ca.macrz.com;
    # grpc_ssl_verify off;
    # 更严谨的生产环境建议改为：grpc_ssl_verify on; 并配置 grpc_ssl_trusted_certificate。
}

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: "http://172.17.0.1:9999"
        HTTPS_PROXY: "http://172.17.0.1:9999"
        NO_PROXY: "localhost,127.0.0.1"
    container_name: server
    ports:
      - "10500:8000"
    volumes:
      - ./data_storage:/app/data_storage
      - ./logs:/app/logs
      # - ./hmog_data:/app/hmog_data:ro   # Optional: mount HMOG attacker dataset
      # - ./certs:/app/certs:ro           # Optional: mount TLS cert/key bundle
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - HTTP_ENABLED=false
      - DATA_STORAGE_PATH=/app/data_storage/raw_data
      - PROCESSED_DATA_PATH=/app/data_storage/processed_data
      - INFERENCE_STORAGE_PATH=/app/data_storage/inference
      - LOG_PATH=/app/logs
      # - HMOG_DATA_PATH=/app/hmog_data   # Optional: override HMOG dataset path
      - ENCRYPTION_KEY=Continuous_Authentication
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=8000
      # - TLS_CERTFILE=/app/certs/server.crt   # Optional: enable TLS 1.2/1.3
      # - TLS_KEYFILE=/app/certs/server.key
      # - TLS_CA_CERTS=/app/certs/ca_bundle.pem
      # - TLS_KEYFILE_PASSWORD=changeit
    restart: unless-stopped
    # Healthcheck using gRPC health service over h2c (single exposed port)
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; from grpc_health.v1 import health_pb2, health_pb2_grpc; stub = health_pb2_grpc.HealthStub(grpc.insecure_channel('localhost:8000')); resp = stub.Check(health_pb2.HealthCheckRequest(service='')); print(resp.status)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
